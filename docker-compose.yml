services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: static-analysis-db
    environment:
      POSTGRES_DB: analysis_db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: strelka
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strelka -d analysis_db "]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: static-analysis-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # FastAPI Application
  web:
    build: .
    container_name: static-analysis-web
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://strelka:password@db:5432/analysis_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: db+postgresql://strelka:password@db:5432/analysis_db
    volumes:
      - ./uploads:/app/uploads
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  # Celery Worker
  celery-worker:
    build: .
    container_name: static-analysis-celery-worker
    command: celery -A celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://strelka:password@db:5432/analysis_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: db+postgresql://strelka:password@db:5432/analysis_db
    volumes:
      - ./uploads:/app/uploads
      - .:/app
    depends_on:
      - db
      - rabbitmq
      - web
    networks:
      - app-network

volumes:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge
